{% extends "base.html" %}

{% block content %}
<div class="flex flex-col md:flex-row md:items-center justify-between mb-8 animate-slide-up" style="animation-delay: 0.1s;">
    <div>
        <h2 class="text-3xl font-bold text-textMain tracking-tight">Task Manager</h2>
        <p class="text-textMuted mt-1 text-sm font-medium">Organize upcoming deadlines and one-off actions.</p>
    </div>
    
    <div class="mt-5 md:mt-0 flex items-center gap-3">
        <button class="bg-white border border-gray-100 text-textMuted hover:text-brand font-bold text-sm px-5 py-3 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 flex items-center gap-2 outline-none focus:ring-4 focus:ring-brand-light">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            Filter
        </button>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start pb-12">
    
    <div class="lg:col-span-4 space-y-6 animate-slide-up" style="animation-delay: 0.2s;">
        
        <div class="pastel-card p-6 flex items-center gap-5">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-light to-white flex items-center justify-center shadow-inner border border-white">
                <svg class="w-7 h-7 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
            </div>
            <div>
                <h3 class="text-sm font-bold text-textMuted uppercase tracking-wider mb-1">Open Tasks</h3>
                <p class="text-3xl font-bold text-textMain tracking-tight" id="open-tasks-count">--</p>
            </div>
        </div>

        <div class="pastel-card p-7">
            <h3 class="text-lg font-bold text-textMain mb-6 flex items-center gap-2">
                <span class="w-2 h-6 rounded-full bg-brand"></span>
                Create New Task
            </h3>
            
            <div class="space-y-5">
                <div class="input-group">
                    <input type="text" id="task-title" class="input-pastel" placeholder=" " onkeypress="if(event.key === 'Enter') submitTask()">
                    <label class="label-floating">Task Description</label>
                </div>
                
                <div class="input-group">
                    <label class="block text-xs font-bold text-textMuted uppercase tracking-wider mb-2 pl-1">Deadline</label>
                    <input type="date" id="task-deadline" class="input-pastel text-textMain cursor-pointer">
                </div>
                
                <div class="input-group">
                    <label class="block text-xs font-bold text-textMuted uppercase tracking-wider mb-2 pl-1">Priority Level</label>
                    <select id="task-priority" class="input-pastel cursor-pointer font-medium">
                        <option value="Low">Low Priority</option>
                        <option value="Medium" selected>Medium Priority</option>
                        <option value="High">High Priority</option>
                    </select>
                </div>
                
                <button onclick="submitTask()" class="btn-primary w-full mt-2 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Append Task
                </button>
            </div>
        </div>
    </div>

    <div class="lg:col-span-8 animate-slide-up" style="animation-delay: 0.3s;">
        <div class="pastel-card p-2 sm:p-8 overflow-hidden">
            
            <div class="flex items-center justify-between mb-6 px-4 sm:px-0">
                <h3 class="text-xl font-bold text-textMain">Active Board</h3>
                <span class="bg-gray-50 text-textMuted border border-gray-100 text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full">Sorted by Deadline</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 text-[11px] text-textMuted uppercase tracking-wider">
                            <th class="pb-4 pl-4 sm:pl-2 font-bold w-12">Status</th>
                            <th class="pb-4 px-4 font-bold">Task Directive</th>
                            <th class="pb-4 px-4 font-bold w-36">Due Date</th>
                            <th class="pb-4 px-4 font-bold w-32">Priority</th>
                            <th class="pb-4 pr-4 sm:pr-2 font-bold text-right w-24">Action</th>
                        </tr>
                    </thead>
                    <tbody id="task-table-body" class="text-sm">
                        
                        <tr class="animate-pulse border-b border-gray-50">
                            <td class="py-5 pl-4 sm:pl-2"><div class="w-6 h-6 rounded-lg bg-gray-100"></div></td>
                            <td class="py-5 px-4"><div class="h-4 bg-gray-200 rounded-md w-3/4"></div></td>
                            <td class="py-5 px-4">
                                <div class="flex flex-col gap-2">
                                    <div class="h-4 bg-gray-200 rounded-md w-16"></div>
                                    <div class="h-3 bg-gray-100 rounded-md w-12"></div>
                                </div>
                            </td>
                            <td class="py-5 px-4"><div class="h-6 bg-gray-100 rounded-lg w-20"></div></td>
                            <td class="py-5 pr-4 sm:pr-2 text-right"><div class="h-8 bg-gray-50 rounded-lg w-16 ml-auto"></div></td>
                        </tr>

                        <tr class="animate-pulse border-b border-gray-50">
                            <td class="py-5 pl-4 sm:pl-2"><div class="w-6 h-6 rounded-lg bg-gray-100"></div></td>
                            <td class="py-5 px-4"><div class="h-4 bg-gray-200 rounded-md w-1/2"></div></td>
                            <td class="py-5 px-4">
                                <div class="flex flex-col gap-2">
                                    <div class="h-4 bg-gray-200 rounded-md w-20"></div>
                                    <div class="h-3 bg-gray-100 rounded-md w-16"></div>
                                </div>
                            </td>
                            <td class="py-5 px-4"><div class="h-6 bg-gray-100 rounded-lg w-24"></div></td>
                            <td class="py-5 pr-4 sm:pr-2 text-right"><div class="h-8 bg-gray-50 rounded-lg w-16 ml-auto"></div></td>
                        </tr>
                        
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='tasks.js') }}"></script>
{% endblock %}
